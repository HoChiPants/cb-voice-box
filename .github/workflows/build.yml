name: Build desktop apps

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            name: CB-Voice-Box-macOS
          - os: windows-2022
            name: CB-Voice-Box-Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install app dependencies
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Download bundled speech model
        shell: bash
        run: curl -L --fail --retry 3 -o ggml-tiny.en.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin
      - name: Build whisper.cpp (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 --branch v1.9.1 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper.cpp
          cmake -S /tmp/whisper.cpp -B /tmp/whisper.cpp/build -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build /tmp/whisper.cpp/build --config Release -j 3
          cp /tmp/whisper.cpp/build/bin/whisper-cli ./whisper-cli
      - name: Download whisper.cpp (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/ggml-org/whisper.cpp/releases/download/v1.9.1/whisper-bin-x64.zip -OutFile whisper.zip
          Expand-Archive whisper.zip whisper-bin
          Copy-Item whisper-bin/Release/* .
      - name: Build macOS menu-bar app
        if: runner.os == 'macOS'
        run: pyinstaller --noconfirm --clean --windowed --name "CB Voice Box" --osx-bundle-identifier com.cbvoicebox.app --add-binary "whisper-cli:." --add-data "ggml-tiny.en.bin:." cb_voice_box.py
      - name: Add macOS privacy metadata and signature
        if: runner.os == 'macOS'
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string CB Voice Box needs microphone access to receive audio from the connected USB radio." "dist/CB Voice Box.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1.1" "dist/CB Voice Box.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :LSUIElement bool true" "dist/CB Voice Box.app/Contents/Info.plist"
          codesign --force --deep --sign - --entitlements macos-entitlements.plist "dist/CB Voice Box.app"
      - name: Build Windows tray app
        if: runner.os == 'Windows'
        shell: pwsh
        run: pyinstaller --noconfirm --clean --windowed --onefile --name "CB-Voice-Box" --add-binary "whisper-cli.exe;." --add-binary "*.dll;." --add-data "ggml-tiny.en.bin;." cb_voice_box.py
      - name: Package macOS
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/CB Voice Box.app" "${{ matrix.name }}.zip"
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive "dist/CB-Voice-Box.exe" "${{ matrix.name }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip
